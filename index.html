<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Odyssey Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #fff;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            flex: 1;
        }

        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            padding: 15px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #infoPanel {
            top: 20px;
            left: 20px;
            width: 300px;
            min-height: 120px;
        }

        #controlsPanel {
            bottom: 20px;
            left: 20px;
            width: 300px;
            line-height: 1.6;
        }

        #targetPanel {
            top: 20px;
            right: 20px;
            width: 280px;
            min-height: 100px;
        }

        .panel-title {
            color: #00ff88;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .panel-content {
            color: #0f0;
            font-size: 11px;
            line-height: 1.5;
        }

        a {
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
        }

        a:hover {
            color: #00ffff;
            text-decoration: underline;
        }

        .status-active {
            color: #00ff88;
        }

        .status-inactive {
            color: #666;
        }

        .instruction {
            color: #00ffaa;
            font-size: 10px;
            margin-top: 10px;
            line-height: 1.4;
        }

        .planet-name {
            color: #00ffff;
            font-weight: bold;
        }

        #orbitingIndicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            text-align: center;
            font-size: 14px;
            color: #00ff88;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .orbiting {
            opacity: 1 !important;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="infoPanel" class="ui-panel">
            <div class="panel-title">SPACESHIP STATUS</div>
            <div class="panel-content">
                <div>Position: <span id="posX">0</span>, <span id="posY">0</span></div>
                <div>Velocity: <span id="velDisplay">0</span></div>
                <div style="margin-top: 10px;">Targets: <span id="targetCount">5</span></div>
                <div class="instruction">Approach a planet to explore</div>
            </div>
        </div>

        <div id="targetPanel" class="ui-panel">
            <div class="panel-title">NEAREST TARGET</div>
            <div class="panel-content" id="targetInfo">
                <div>Scanning...</div>
            </div>
        </div>

        <div id="controlsPanel" class="ui-panel">
            <div class="panel-title">FLIGHT CONTROLS</div>
            <div class="panel-content">
                ↑ / W - Forward<br>
                ← / A - Rotate Left<br>
                → / D - Rotate Right<br>
                ↓ / S - Reverse<br><br>
                <span class="instruction">SPACE - Dock Station<br>
                ESC - Exit Station</span>
            </div>
        </div>

        <div id="orbitingIndicator" class="ui-panel">
            <div class="panel-title pulse">● ORBITING ●</div>
            <div class="panel-content" id="orbitingName"></div>
            <div class="instruction" style="margin-top: 5px;">Press ESC to exit</div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - Customize your projects here
        // ============================================
        const PROJECTS = [
            {
                name: "Project Alpha",
                color: "#ff006e",
                x: 300,
                y: 200,
                radius: 35,
                description: "AI-powered analytics platform",
                link: "https://github.com"
            },
            {
                name: "Project Beta",
                color: "#00f5ff",
                x: 800,
                y: 300,
                radius: 30,
                description: "Real-time collaboration tool",
                link: "https://github.com"
            },
            {
                name: "Project Gamma",
                color: "#ffbe0b",
                x: 1200,
                y: 400,
                radius: 32,
                description: "Machine learning model registry",
                link: "https://github.com"
            },
            {
                name: "Project Delta",
                color: "#fb5607",
                x: 600,
                y: 700,
                radius: 38,
                description: "Distributed data pipeline",
                link: "https://github.com"
            },
            {
                name: "Project Epsilon",
                color: "#8338ec",
                x: 1100,
                y: 800,
                radius: 28,
                description: "Neural network visualization",
                link: "https://github.com"
            }
        ];

        // ============================================
        // GAME STATE
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameWidth = canvas.width = window.innerWidth;
        let gameHeight = canvas.height = window.innerHeight;

        const spaceship = {
            x: gameWidth / 2,
            y: gameHeight / 2,
            vx: 0,
            vy: 0,
            angle: 0,
            speed: 0,
            maxSpeed: 6,
            friction: 0.99,
            rotationSpeed: 0.1,
            size: 12,
            docking: false,
            dockedPlanet: null
        };

        const keys = {};
        let stars = [];
        let targetPlanet = null;

        // ============================================
        // INITIALIZATION
        // ============================================
        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * gameWidth * 1.5,
                    y: Math.random() * gameHeight * 1.5,
                    size: Math.random() * 1.5,
                    depth: Math.random() * 0.5 + 0.5
                });
            }
        }

        function findNearestPlanet() {
            let nearest = null;
            let minDist = Infinity;

            for (let planet of PROJECTS) {
                const dx = planet.x - spaceship.x;
                const dy = planet.y - spaceship.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < minDist) {
                    minDist = dist;
                    nearest = { planet, distance: dist };
                }
            }

            return nearest;
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        window.addEventListener('keydown', (e) => {
            keys[e.key.toUpperCase()] = true;

            if (e.code === 'Space') {
                const nearest = findNearestPlanet();
                if (nearest && nearest.distance < nearest.planet.radius + 100) {
                    spaceship.docking = true;
                    spaceship.dockedPlanet = nearest.planet;
                    spaceship.speed = 0;
                }
            }

            if (e.key === 'Escape') {
                spaceship.docking = false;
                spaceship.dockedPlanet = null;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toUpperCase()] = false;
        });

        window.addEventListener('resize', () => {
            gameWidth = canvas.width = window.innerWidth;
            gameHeight = canvas.height = window.innerHeight;
        });

        // ============================================
        // GAME LOGIC
        // ============================================
        function update() {
            if (spaceship.docking && spaceship.dockedPlanet) {
                // Orbital mechanics
                const planet = spaceship.dockedPlanet;
                const dx = planet.x - spaceship.x;
                const dy = planet.y - spaceship.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Smoothly orbit the planet
                const orbitRadius = planet.radius + 80;
                const targetAngle = Math.atan2(dy, dx);
                const perpX = Math.cos(targetAngle + Math.PI / 2);
                const perpY = Math.sin(targetAngle + Math.PI / 2);

                spaceship.x = planet.x + Math.cos(targetAngle) * orbitRadius;
                spaceship.y = planet.y + Math.sin(targetAngle) * orbitRadius;

                spaceship.angle = targetAngle + Math.PI / 2;
                spaceship.speed = 2;

                // Auto-advance orbit angle
                const angle = Math.atan2(spaceship.y - planet.y, spaceship.x - planet.x);
                const newAngle = angle + 0.01;
                spaceship.x = planet.x + Math.cos(newAngle) * orbitRadius;
                spaceship.y = planet.y + Math.sin(newAngle) * orbitRadius;
            } else {
                // Normal flight
                if (keys['W'] || keys['ARROWUP']) {
                    spaceship.vx += Math.cos(spaceship.angle) * 0.4;
                    spaceship.vy += Math.sin(spaceship.angle) * 0.4;
                }
                if (keys['S'] || keys['ARROWDOWN']) {
                    spaceship.vx -= Math.cos(spaceship.angle) * 0.3;
                    spaceship.vy -= Math.sin(spaceship.angle) * 0.3;
                }
                if (keys['A'] || keys['ARROWLEFT']) {
                    spaceship.angle -= spaceship.rotationSpeed;
                }
                if (keys['D'] || keys['ARROWRIGHT']) {
                    spaceship.angle += spaceship.rotationSpeed;
                }

                // Apply friction
                spaceship.vx *= spaceship.friction;
                spaceship.vy *= spaceship.friction;

                // Cap speed
                spaceship.speed = Math.sqrt(spaceship.vx * spaceship.vx + spaceship.vy * spaceship.vy);
                if (spaceship.speed > spaceship.maxSpeed) {
                    spaceship.vx *= spaceship.maxSpeed / spaceship.speed;
                    spaceship.vy *= spaceship.maxSpeed / spaceship.speed;
                }

                spaceship.x += spaceship.vx;
                spaceship.y += spaceship.vy;
            }

            // Wrap around screen
            if (spaceship.x < -50) spaceship.x = gameWidth + 50;
            if (spaceship.x > gameWidth + 50) spaceship.x = -50;
            if (spaceship.y < -50) spaceship.y = gameHeight + 50;
            if (spaceship.y > gameHeight + 50) spaceship.y = -50;

            targetPlanet = findNearestPlanet();
        }

        // ============================================
        // RENDERING
        // ============================================
        function drawStarfield() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, gameWidth, gameHeight);

            for (let star of stars) {
                // Parallax effect
                const offsetX = (spaceship.x * 0.1) % gameWidth;
                const offsetY = (spaceship.y * 0.1) % gameHeight;

                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * star.depth})`;
                ctx.fillRect(
                    (star.x - offsetX) % gameWidth,
                    (star.y - offsetY) % gameHeight,
                    star.size,
                    star.size
                );
            }
        }

        function drawPlanets() {
            for (let planet of PROJECTS) {
                // Glow effect
                const glowSize = planet.radius + 20;
                const gradient = ctx.createRadialGradient(planet.x, planet.y, planet.radius, planet.x, planet.y, glowSize);
                gradient.addColorStop(0, planet.color);
                gradient.addColorStop(0.5, planet.color + '80');
                gradient.addColorStop(1, planet.color + '00');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, glowSize, 0, Math.PI * 2);
                ctx.fill();

                // Planet body
                ctx.fillStyle = planet.color;
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fill();

                // Planet border
                ctx.strokeStyle = planet.color + 'ff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Planet name
                ctx.fillStyle = planet.color;
                ctx.font = 'bold 12px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText(planet.name, planet.x, planet.y + planet.radius + 25);
            }
        }

        function drawSpaceship() {
            ctx.save();
            ctx.translate(spaceship.x, spaceship.y);
            ctx.rotate(spaceship.angle);

            // Ship body
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(-8, -8);
            ctx.lineTo(-4, 0);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();

            // Thruster glow
            if (spaceship.speed > 0.5) {
                ctx.fillStyle = '#ff006e';
                ctx.beginPath();
                ctx.moveTo(-4, -4);
                ctx.lineTo(-4, 4);
                ctx.lineTo(-12 - spaceship.speed * 2, 0);
                ctx.closePath();
                ctx.fill();

                // Flame flicker
                ctx.fillStyle = '#ffbe0b';
                ctx.beginPath();
                ctx.moveTo(-6, -2);
                ctx.lineTo(-6, 2);
                ctx.lineTo(-8 - Math.random() * spaceship.speed * 2, 0);
                ctx.closePath();
                ctx.fill();
            }

            ctx.restore();
        }

        function drawDistanceLines() {
            if (targetPlanet) {
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(spaceship.x, spaceship.y);
                ctx.lineTo(targetPlanet.planet.x, targetPlanet.planet.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function draw() {
            drawStarfield();
            drawPlanets();
            drawDistanceLines();
            drawSpaceship();
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            // Info panel
            document.getElementById('posX').textContent = Math.round(spaceship.x);
            document.getElementById('posY').textContent = Math.round(spaceship.y);
            document.getElementById('velDisplay').textContent = (spaceship.speed * 10).toFixed(0) + '%';
            document.getElementById('targetCount').textContent = PROJECTS.length;

            // Target panel
            if (targetPlanet) {
                const planet = targetPlanet.planet;
                const distance = Math.round(targetPlanet.distance);
                const dockDistance = planet.radius + 100;
                const canDock = distance < dockDistance;

                document.getElementById('targetInfo').innerHTML = `
                    <div style="color: ${planet.color}">◆ ${planet.name}</div>
                    <div style="margin-top: 8px; font-size: 10px;">
                        <div>Distance: ${distance}px</div>
                        <div style="margin-top: 5px; color: ${canDock ? '#00ff88' : '#ff0055'}">
                            ${canDock ? '✓ In range - Press SPACE' : '✗ Out of range'}
                        </div>
                        <div style="margin-top: 8px; font-size: 9px; color: #0f0;">
                            ${planet.description}
                        </div>
                    </div>
                `;
            }

            // Orbiting indicator
            const orbitIndicator = document.getElementById('orbitingIndicator');
            if (spaceship.docking) {
                orbitIndicator.classList.add('orbiting');
                document.getElementById('orbitingName').textContent = spaceship.dockedPlanet.name;
            } else {
                orbitIndicator.classList.remove('orbiting');
            }
        }

        // ============================================
        // MAIN GAME LOOP
        // ============================================
        function gameLoop() {
            update();
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        initStars();
        gameLoop();
    </script>
</body>
</html>
